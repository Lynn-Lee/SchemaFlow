name: Publish

on:
  push:
    tags:
      - 'v*'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js 24.x
        uses: actions/setup-node@v6
        with:
          node-version: 24.x

      - name: Log in to the Container registry
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm run test:ci

      - name: Build project
        run: npm run build

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker smoke build
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          push: false
          platforms: linux/amd64
          tags: schemaflow-release-smoke:ci

      - name: Docker smoke run
        run: |
          set -euo pipefail
          docker run --rm -d -p 8080:80 --name schemaflow-release-smoke schemaflow-release-smoke:ci
          trap 'docker rm -f schemaflow-release-smoke >/dev/null 2>&1 || true' EXIT

          curl --fail --silent --show-error --head http://localhost:8080/
          curl --fail --silent --show-error --head http://localhost:8080/config.js

          root_headers="$(curl --fail --silent --show-error --head http://localhost:8080/)"
          config_headers="$(curl --fail --silent --show-error --head http://localhost:8080/config.js)"

          echo "$root_headers" | grep -i "content-security-policy"
          echo "$root_headers" | grep -i "x-content-type-options: nosniff"
          echo "$root_headers" | grep -i "referrer-policy"
          echo "$root_headers" | grep -i "x-frame-options"
          echo "$root_headers" | grep -i "permissions-policy"
          echo "$config_headers" | grep -i "cache-control: no-store"

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}

      - name: Build and push multi-arch Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
