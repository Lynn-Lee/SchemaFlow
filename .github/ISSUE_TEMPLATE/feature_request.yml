name: Feature request
description: Propose an improvement that preserves SchemaFlow's local-first OSS Core.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user workflow is blocked or painful today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the smallest useful behavior.
    validations:
      required: true
  - type: textarea
    id: local-first-impact
    attributes:
      label: Local-first impact
      description: Explain how this works without accounts, cloud storage, database passwords, or automatic uploads.
      placeholder: This keeps diagram data in IndexedDB and does not require login...
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Product area
      options:
        - Onboarding
        - Import
        - Export
        - Diagram editing
        - Templates
        - Settings
        - Backup and restore
        - Performance
        - Self-hosting
        - Optional Cloud/Team research
        - Other
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What workaround or simpler option did you consider?
  - type: checkboxes
    id: boundaries
    attributes:
      label: Scope boundaries
      options:
        - label: This request does not require default login or account registration.
          required: true
        - label: This request does not automatically upload local diagrams or schema content.
          required: true
